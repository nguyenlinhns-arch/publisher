# Release trigger for v0.5.4 single Playwright session and login repair.
name: Publish Windows release

"on":
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025
    timeout-minutes: 35
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Create controlled virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Fetch verified ffprobe
        shell: pwsh
        run: ./scripts/fetch_ffprobe.ps1

      - name: Test and build Windows
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Smoke test packaged application
        shell: pwsh
        run: ./scripts/smoke_windows.ps1

      - name: Package ZIP and checksum
        shell: pwsh
        run: ./scripts/package_windows.ps1

      - name: Publish stable GitHub release
        shell: pwsh
        run: |
          $tag = "v0.5.4"
          $title = "MXH Publisher v0.5.4"
          $files = Get-ChildItem release -File | ForEach-Object { $_.FullName }
          if (-not $files) { throw "No release files were produced." }
          gh release view $tag --repo "${{ github.repository }}" 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber --repo "${{ github.repository }}"
          } else {
            gh release create $tag $files --title $title --notes-file RELEASE_NOTES_V0.5.4.md --repo "${{ github.repository }}"
          }
          if ($LASTEXITCODE -ne 0) { throw "GitHub Release upload failed." }
