name: Coin V8 Iterative Indicator Research

on:
  push:
    paths:
      - "coin-v8/trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coin-v8-iterative-research
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Record auditable running status
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          mkdir -p coin-v8/status
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          payload = {
              "state": "RUNNING",
              "run_id": os.environ["RUN_ID"],
              "run_attempt": os.environ["RUN_ATTEMPT"],
              "trigger_sha": os.environ["HEAD_SHA"],
              "started_at_utc": datetime.now(timezone.utc).isoformat(),
              "mode": "RESEARCH_ONLY / NO_PAPER / NO_LIVE",
          }
          open("coin-v8/status/latest.json", "w", encoding="utf-8").write(json.dumps(payload, indent=2))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coin-v8/status/latest.json
          git commit -m "Mark Coin V8 research run ${RUN_ID} running [skip ci]" || true
          git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow numpy requests numba scipy

      - name: Reconstruct and verify iterative runner
        run: |
          cat coin-v8/source/iterative_research.b64.part* | base64 --decode > coin-v8/iterative_research.py
          python -m py_compile coin-v8/iterative_research.py
          test "$(sha256sum coin-v8/iterative_research.py | cut -d' ' -f1)" = "ec5b1979369135917866bb732eaca0f856b964545691db9952026d84f5c45273"

      - name: Run iterative indicator research
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
        run: python coin-v8/iterative_research.py

      - name: Upload full research results
        uses: actions/upload-artifact@v4
        with:
          name: coin-v8-iterative-results-${{ github.run_id }}
          path: coin-v8/results/*
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

      - name: Commit compact results and success status
        if: success()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          p = "coin-v8/status/latest.json"
          try:
              payload = json.load(open(p, encoding="utf-8"))
          except Exception:
              payload = {}
          payload.update({
              "state": "COMPLETED",
              "run_id": os.environ["RUN_ID"],
              "run_attempt": os.environ["RUN_ATTEMPT"],
              "completed_at_utc": datetime.now(timezone.utc).isoformat(),
          })
          open(p, "w", encoding="utf-8").write(json.dumps(payload, indent=2))
          PY
          git add coin-v8/results coin-v8/status/latest.json
          git commit -m "Update Coin V8 iterative research results [skip ci]" || true
          git push

      - name: Record failure status
        if: failure()
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          git pull --rebase || true
          mkdir -p coin-v8/status
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          p = "coin-v8/status/latest.json"
          try:
              payload = json.load(open(p, encoding="utf-8"))
          except Exception:
              payload = {}
          payload.update({
              "state": "FAILED",
              "run_id": os.environ["RUN_ID"],
              "run_attempt": os.environ["RUN_ATTEMPT"],
              "failed_at_utc": datetime.now(timezone.utc).isoformat(),
          })
          open(p, "w", encoding="utf-8").write(json.dumps(payload, indent=2))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coin-v8/status/latest.json
          git commit -m "Mark Coin V8 research run ${RUN_ID} failed [skip ci]" || true
          git push || true
