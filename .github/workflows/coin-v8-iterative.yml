name: Coin V8 Iterative Indicator Research

on:
  push:
    paths:
      - "coin-v8/trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coin-v8-iterative-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas pyarrow numpy requests numba scipy

      - name: Reconstruct and verify iterative runner
        run: |
          cat coin-v8/source/iterative_research.b64.part* | base64 --decode > coin-v8/iterative_research.py
          python -m py_compile coin-v8/iterative_research.py
          test "$(sha256sum coin-v8/iterative_research.py | cut -d' ' -f1)" = "ec5b1979369135917866bb732eaca0f856b964545691db9952026d84f5c45273"

      - name: Run iterative indicator research
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_SHA: ${{ github.sha }}
        run: python coin-v8/iterative_research.py

      - name: Upload full research results
        uses: actions/upload-artifact@v4
        with:
          name: coin-v8-iterative-results-${{ github.run_id }}
          path: coin-v8/results/*
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

      - name: Commit compact results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coin-v8/results
          git commit -m "Update Coin V8 iterative research results [skip ci]" || exit 0
          git push
