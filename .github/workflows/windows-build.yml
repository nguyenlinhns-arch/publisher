name: MXH Video Editor Windows build

"on":
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Create controlled virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Fetch verified ffprobe
        shell: pwsh
        run: ./scripts/fetch_ffprobe.ps1

      - name: Test and build Windows onedir
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Smoke test packaged application
        shell: pwsh
        run: ./scripts/smoke_windows.ps1

      - name: Package ZIP and checksum
        shell: pwsh
        run: ./scripts/package_windows.ps1

      - name: Upload unsigned test build
        uses: actions/upload-artifact@v7
        with:
          name: MXHVideoEditor-Windows-x64-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
