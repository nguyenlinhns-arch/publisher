name: VN30F1M isolated research

on:
  push:
    branches:
      - research/vn30f1m-backtest-2026
    paths:
      - 'research/vn30f1m/**'
      - '.github/workflows/vn30f1m-research.yml'
  pull_request:
    branches:
      - research/vn30f1m-backtest-2026
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/vn30f1m-backtest-2026
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas numpy openpyxl vnstock

      - name: Probe public data sources
        run: python research/vn30f1m/probe_data_sources.py

      - name: Upload generated diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vn30f1m-data-diagnostics
          path: research/vn30f1m/output
          if-no-files-found: error
          retention-days: 7
